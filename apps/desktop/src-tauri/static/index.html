<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NyraQ</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.22), transparent 28%),
          radial-gradient(circle at top right, rgba(245, 158, 11, 0.18), transparent 32%),
          radial-gradient(circle at bottom, rgba(217, 70, 239, 0.16), transparent 34%),
          linear-gradient(180deg, #eef2ff 0%, #f8fafc 18%, #eef2ff 100%);
        color: #f8fafc;
      }

      main {
        display: grid;
        place-items: center;
        height: 100%;
        padding: 24px;
      }

      .panel {
        max-width: 560px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 32px;
        padding: 32px;
        background:
          linear-gradient(155deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.78)),
          rgba(255, 255, 255, 0.72);
        box-shadow: 0 34px 120px rgba(15, 23, 42, 0.14);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 18px;
      }

      .brand img {
        width: 76px;
        height: 76px;
        border-radius: 24px;
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.14);
      }

      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.05em;
        color: #0f172a;
      }

      .eyebrow {
        margin: 0 0 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(71, 85, 105, 0.78);
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(51, 65, 85, 0.78);
      }

      code {
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="brand">
          <img src="./nyraq-mark.svg" alt="NyraQ logo" />
          <div>
            <div class="eyebrow">NyraQ</div>
            <h1>Operator shell</h1>
          </div>
        </div>
        <p>The native shell is waiting for the local dashboard stack to become reachable. If this screen remains visible, run <code>./scripts/stack.sh health</code> from the repository root and inspect <code>.sthyra/</code> logs.</p>
      </section>
    </main>
  </body>
</html>
